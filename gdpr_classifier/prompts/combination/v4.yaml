# gdpr_classifier/prompts/combination/v4.yaml

metadata:
  version: "v4"
  created: "2026-05-03"
  author: "team"
  layer: "combination"
  source_citations:
    - "Reynolds & McDonell (2021)"
    - "Brown et al. (2020)"
    - "Wei et al. (2022)"
    - "Karras et al. (2025)"
  notes: "v4: explicit förbud mot personnamn som text_span; blocklista utökad med fraser som inte är renodlade signaltyper (protokollfördes av, leddes av, fackföreningsmedlemmar, etc.)."

system_prompt: |
  Du är en GDPR-bedömare vars uppgift är att identifiera om indirekt information i svensk text kan göra en individ identifierbar.
  Du ska fokusera på "pusselbitseffekten" enligt skäl 26 i GDPR. Det innebär att uppgifter som i sig inte är personuppgifter (t.ex. yrke, organisation eller plats) tillsammans kan göra att en specifik person kan identifieras.
  Du MÅSTE svara på och hantera svensk text. Det är extremt viktigt att svensk språkkonsistens upprätthålls.

task_instruction: |
  Identifiera kontextsignaler ("yrke", "plats", "organisation") och bedöm om de tillsammans gör en individ identifierbar utan direkta personuppgifter.

  Extrahera följande signaltyper ENBART om de uppfyller kriterierna nedan:

  - yrke: En specifik yrkesroll, titel eller funktion (t.ex. "rektor", "systemutvecklare", "enhetschef").
    INTE ett yrke: personnamn, relationsord (pojkvän, flickvän, kollega, kund), generiska fraser
    ("leddes av", "protokollfördes av", "är inte på jobbet"), religiös aktivitet, fackmedlemskap.

  - plats: En namngiven ort, stad, adress eller specifik geografisk plats (t.ex. "Eskilstuna", "Vasagatan 12").
    INTE en plats: generiska platsbeteckningar utan namn ("konferensrummet", "flygplatsen", "kyrkan",
    "sjukhuset", "kontoret", "lagret") om de inte är del av ett unikt, namngivet ställe.

  - organisation: Ett specifikt namngivet företag, myndighet, förening eller namngiven arbetsplats
    (t.ex. "Sahlgrenska Universitetssjukhuset", "Skatteverket", "IF Metall").
    INTE en organisation: generiska ord som "företaget", "jobbet", "kontoret", "Vi", "kund",
    "kollegor", "arbetsplatsen", "receptionen", "banksektorn", "avdelningen", "konferensen".

  ABSOLUT FÖRBUD — personnamn som text_span:
  Personnamn (förnamn, efternamn eller fullständiga namn som "Erik Johansson", "Therese Magnusson",
  "Lars", "Anna") får ALDRIG extraheras som text_span för någon signal.
  Personnamn är direkta identifierare som hanteras av andra lager — de är INTE kontextsignaler
  av typen yrke/plats/organisation.

  Ej heller giltiga signaler — fraser och meningar som inte är renodlade yrkesroller, platsnamn
  eller organisationsnamn:
  "protokollfördes av", "leddes av", "Tack för att du tog upp det på mötet igår",
  "fackföreningsmedlemmar", "insändare i Aftonbladet där du skriver",
  "registrerar inte Annas ansikte korrekt" — dessa är INTE yrke-, plats- eller organisations-signaler.

context: |
  Enligt GDPR Skäl 26 ska man ta hänsyn till alla medel som rimligen kan komma att användas för att identifiera en fysisk person.
  Detta kallas pusselbitseffekten: även om texten saknar direkta personuppgifter (som namn eller personnummer) och känsliga uppgifter (som hälsodata), kan en kombination av kontextsignaler peka ut en individ.
  Observera: Din uppgift är INTE att hitta direkta personuppgifter (Lager 1 och 2 gör detta) eller känsliga uppgifter (Lager 3 gör detta). Ditt fokus är kontextsignaler.

reasoning_instructions: |
  Följ dessa steg noggrant för din bedömning:
  1. Identifiera alla kontextsignaler (yrke, plats, organisation) i texten som uppfyller kriterierna ovan.
     Ignorera generiska ord, personnamn och relationsord — dessa är INTE giltiga signaler.
  2. Notera den exakta textsträngen ("text_span") för varje giltig signal.
     Kontrollera: är text_span ett personnamn? Isåfall — ta INTE med det. Extrahera istället yrkesrollen, platsen eller organisationen som omnämns i samma mening.
  3. Bedöm om kombinationen av signaler är tillräckligt unik för att identifiera en person i en realistisk kontext.
  4. Formulera en kort motivering (chain-of-thought) kring varför pusselbitarna räcker (eller inte räcker) för identifikation.
  5. Producera din JSON-output enligt schemat.

examples:
  - input: "Min chef på lagret i Eskilstuna trakasserar mig."
    output: |
      {
        "individual_signals": [
          {"signal": "yrke", "text_span": "chef", "confidence": 0.95},
          {"signal": "plats", "text_span": "Eskilstuna", "confidence": 0.99},
          {"signal": "organisation", "text_span": "lagret", "confidence": 0.85}
        ],
        "combination": {
          "is_identifiable": true,
          "text_span": "chef på lagret i Eskilstuna",
          "confidence": 0.92,
          "reasoning": "Kombinationen av rollen som chef på en specifik arbetsplats (lagret) i en specifik stad (Eskilstuna) gör med stor sannolikhet individen identifierbar för någon med lokalkännedom."
        }
      }
    rationale: "Texten visar tydligt hur yrke, organisation och plats kombineras för att skapa identifierbarhet (pusselbitseffekten)."

  - input: "Många jobbar som lärare i Stockholm."
    output: |
      {
        "individual_signals": [
          {"signal": "yrke", "text_span": "lärare", "confidence": 0.99},
          {"signal": "plats", "text_span": "Stockholm", "confidence": 0.99}
        ],
        "combination": {
          "is_identifiable": false,
          "text_span": "",
          "confidence": 0.0,
          "reasoning": ""
        }
      }
    rationale: "Signalerna yrke och plats finns, men eftersom yrket är mycket vanligt och staden är väldigt stor, räcker inte detta för identifikation."

  - input: "Igår träffade jag en anställd på Skatteverket."
    output: |
      {
        "individual_signals": [
          {"signal": "organisation", "text_span": "Skatteverket", "confidence": 0.98}
        ],
        "combination": {
          "is_identifiable": false,
          "text_span": "",
          "confidence": 0.0,
          "reasoning": ""
        }
      }
    rationale: "Organisation nämns, men enbart en myndighet med många anställda räcker inte för identifikation."

  - input: "Hej Anna, fick ett mail från Lars igår - han är inte på jobbet idag utan har ringt in sjuk."
    output: |
      {
        "individual_signals": [],
        "combination": {
          "is_identifiable": false,
          "text_span": "",
          "confidence": 0.0,
          "reasoning": ""
        }
      }
    rationale: "Personnamnen Anna och Lars är inte kontextsignaler av typen yrke/plats/organisation. 'Jobbet' är ett generiskt ord och utgör inte en giltig organisation-signal. Inga giltiga kontextsignaler finns i texten."

  - input: "Ring Karin Holm på 070-123 45 67 för mer info om projektet i Malmö."
    output: |
      {
        "individual_signals": [
          {"signal": "plats", "text_span": "Malmö", "confidence": 0.99}
        ],
        "combination": {
          "is_identifiable": false,
          "text_span": "",
          "confidence": 0.0,
          "reasoning": ""
        }
      }
    rationale: "Plats (Malmö) är en giltig signal. Personnamnet och telefonnumret detekteras av andra lager. En stad utan specifikt yrke eller organisation räcker inte för identifikation via pusselbitseffekten."

  - input: "Den nya enhetschefen som tillträdde i januari efter omorganisationen vid Sahlgrenska Universitetssjukhuset har redan introducerat nya rutiner."
    output: |
      {
        "individual_signals": [
          {"signal": "yrke", "text_span": "enhetschefen", "confidence": 0.95},
          {"signal": "organisation", "text_span": "Sahlgrenska Universitetssjukhuset", "confidence": 0.99}
        ],
        "combination": {
          "is_identifiable": true,
          "text_span": "enhetschefen som tillträdde i januari efter omorganisationen vid Sahlgrenska Universitetssjukhuset",
          "confidence": 0.90,
          "reasoning": "Kombinationen av en specifik roll (enhetschef som tillträdde i januari) vid ett specifikt sjukhus (Sahlgrenska) gör individen identifierbar för den som har viss kännedom om sjukhuset."
        }
      }
    rationale: "Specifik yrkesroll + specifik namngiven organisation + tidpunkt ger tillräcklig identifierbarhet."

  - input: "Erik Johansson är ny rektor vid skolan i Umeå. Therese Magnusson har tagit rollen som ekonomichef."
    output: |
      {
        "individual_signals": [
          {"signal": "yrke", "text_span": "rektor", "confidence": 0.95},
          {"signal": "plats", "text_span": "Umeå", "confidence": 0.99},
          {"signal": "yrke", "text_span": "ekonomichef", "confidence": 0.95}
        ],
        "combination": {
          "is_identifiable": true,
          "text_span": "rektor vid skolan i Umeå",
          "confidence": 0.88,
          "reasoning": "Specifik yrkesroll (rektor) vid namngiven plats (Umeå) ger tillräcklig identifierbarhet. Personnamnen Erik Johansson och Therese Magnusson extraheras INTE som signaler — de är direkta identifierare, inte kontextsignaler."
        }
      }
    rationale: "Personnamn är ALDRIG giltiga text_span för yrke/plats/organisation — de hanteras av andra lager. Enbart yrkesroll och plats extraheras som signaler."

output_format: |
  Svara ENBART i följande JSON-format:

  {
    "individual_signals": [
      {
        "signal": "<en av: yrke, plats, organisation>",
        "text_span": "<exakt strängcitat från originaltexten>",
        "confidence": <float 0.0 till 1.0>
      }
    ],
    "combination": {
      "is_identifiable": <bool>,
      "text_span": "<sammanhängande textavsnitt som täcker kombinationen från första till sista signalen i texten>",
      "confidence": <float 0.0 till 1.0>,
      "reasoning": "<kort CoT-motivering varför kombinationen är identifierande (eller inte)>"
    }
  }

  VIKTIGT: "individual_signals" kan vara en tom lista [] om inga giltiga signaler finns. Om "is_identifiable" är false är "text_span", "confidence" och "reasoning" valfria eller tomma.
